name: Frontend Release Charts - SAST
on:
  push:
    branches: [ "main" ] 
    paths:
      - 'applications/Frontend/**'
      - '.github/workflows/Frontend-docker.yml'

jobs:
  security_scans:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=nimanisha_vyking
            -Dsonar.organization=nimanisha
            -Dsonar.sources=applications/Frontend
            -Dsonar.sarifReportPath=sonar-results.sarif

      - name: Upload Sonar results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: sonar-results.sarif

      - name: Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Frontend'
          path: 'applications/Frontend'
          format: 'HTML'
          out: 'reports'

      - name: Trivy Scan (Helm & Infrastructure)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload HTML Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/

  release:
    needs: security_scans 
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and Push OCI
        run: |
          BASE_VERSION=$(grep '^version:' applications/Frontend/frontend-chart/Chart.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")       
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Building version: $NEW_VERSION"
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[A-Z]' '[a-z]')
          helm package applications/Frontend/frontend-chart --version $NEW_VERSION
          helm push frontend-chart-$NEW_VERSION.tgz oci://ghcr.io/$LOWER_OWNER/charts
