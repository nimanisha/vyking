postgresql:
  global:
    postgresql:
      auth:
        existingSecret: "my-db-postgresql"
        secretKeys:
          adminPasswordKey: "postgres-password"
        database: "my_database"
postgresql:
  networkPolicy:
    enabled: false        
  primary:
    persistence:
      size: 8Gi
backupJob:
  schedule: "0 0 1 * *"