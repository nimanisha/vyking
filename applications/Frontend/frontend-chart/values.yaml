replicaCount: 2

image:
  repository: nginx
  tag: alpine

service:
  type: ClusterIP
  port: 80
serviceAccount:
  create: true
  name: "frontend-service-account"  

backendUrl: "http://backend-service.backend.svc.cluster.local:8080"

hpa:
  minReplicas: 1
  maxReplicas: 2
  targetCPU: 80
ingress:
  enabled: true
  className: "traefik"
  host: "frontend.k3d.localhost" 
  path: /