apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "frontend.fullname" . }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.hpa.targetCPU }}
  - type: Object
    object:
      metric:
        name: istio_requests_latency_p95 
      describedObject:
        apiVersion: networking.istio.io/v1alpha3
        kind: VirtualService
        name: {{ include "frontend.fullname" . }}
      target:
        type: Value
        value: {{ .Values.hpa.targetLatency | default "100ms" | quote }}