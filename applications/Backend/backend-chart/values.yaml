replicaCount: 2

image:
  repository: ghcr.io/nimanisha/backend-app 
  tag: latest 
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-login

database:
  host: "infrastructure-db-postgresql.db.svc.cluster.local"
  name: "my_database"
  user: "postgres"
  # port: "5432"
  existingSecret: "my-db-postgresql" 

service:
  type: ClusterIP
  port: 8080


istio:
  enabled: true
  host: "backend.k3d.localhost"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetLatency: "200ms"  