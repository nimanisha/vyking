apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    app: {{ include "backend.name" . | quote }}
    {{- include "backend.labels" . | nindent 4 }} 
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: {{ include "backend.name" . | quote }}
    {{- include "backend.selectorLabels" . | nindent 4 }}