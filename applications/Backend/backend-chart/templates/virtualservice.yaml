{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - {{ include "backend.fullname" . }}
  - {{ include "backend.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  gateways:
  - mesh
  http:
  - route:
    - destination:
        host: {{ include "backend.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: {{ .Values.service.port }}
      weight: 100
    retries: 
      attempts: 3
      perTryTimeout: 2s
{{- end }}      