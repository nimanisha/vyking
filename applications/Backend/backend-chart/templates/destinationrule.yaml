apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ include "backend.fullname" . }}-dr
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ include "backend.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
  subsets:
  - name: v1
    labels:
      version: {{ .Chart.AppVersion | quote }}    